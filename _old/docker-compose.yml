version: '3' 
######################
networks:
  gnmic-net:
    driver: bridge
######################
services:
  gnmic1:
    image: ghcr.io/openconfig/gnmic:latest
    container_name: gnmic1
    extra_hosts:
      - "srx-1x-92s:135.231.216.136"
      - "srx-2se:135.231.216.104"
    volumes:
      - ./gnmic/gnmic1.yaml:/app/gnmic.yaml
      - ./gnmic/gnmic-subscription.log:/app/gnmic-subscription.log
    command: "subscribe --config /app/gnmic.yaml"
    networks:
      - gnmic-net
    ports:
      - 9804:9804
    depends_on:
      - consul-agent 
#     ######################
  consul-agent:
    image: consul:latest
    container_name: consul
    networks:
      - gnmic-net
    ports:
      - 8500:8500
      - 8600:8600/udp
    command: agent -server -ui -node=server-1 -bootstrap-expect=1 -client=0.0.0.0    
#     ######################
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--storage.tsdb.retention.time=1w'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--log.level=debug'
    ports:
      - 9090:9090
    networks:
      - gnmic-net
#     ######################
  grafana:
      container_name: grafana
      restart: unless-stopped
      image: 'grafana/grafana:latest'
      #user: root
      networks:
          - gnmic-net
      ports:
          - 3000:3000     
      environment:
        GF_MIN_REFRESH_INTERVAL: 1s
        GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 1s
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
        GF_AUTH_DISABLE_LOGIN_FORM: "true"
        GF_AUTH_OAUTH_AUTO_LOGIN: "true"
        #GF_SECURITY_ADMIN_PASSWORD: telemetrySh0w
        #HTTP_PROXY: "http://135.231.216.56:3128"
        #HTTPS_PROXY: "http://135.231.216.56:3128"
        GF_PLUGIN_DIR: /pluginfolder
        GF_INSTALL_PLUGINS: agenty-flowcharting-panel
      volumes:
        - ./grafana/provisioning/:/etc/grafana/provisioning/:ro
        - ./grafana/dashboards:/var/lib/grafana/dashboards
        - GF_PLUGIN_DIR:/pluginfolder
######################
volumes:
  prometheus-data:
  grafana-data:
  GF_PLUGIN_DIR:
