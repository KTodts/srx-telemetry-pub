apiVersion: 1
deleteDatasources:
  - name: Prometheus
    orgId: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    # <string> custom UID which can be used to reference this datasource in other parts of the configuration, if not specified will be generated automatically
    uid: telemetry
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: '3s'
  - name: Loki
    type: loki
    url: http://loki:3100
